name: weblink-pilot

services:
  postgres:
    image: postgres:17-alpine
    container_name: weblink-pilot-postgres
    environment:
      POSTGRES_DB: weblinkpilot
      POSTGRES_USER: weblinkpilot
      POSTGRES_PASSWORD: weblinkpilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weblinkpilot -d weblinkpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: weblink-pilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.22.0
    container_name: weblink-pilot-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    container_name: weblink-pilot-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/weblinkpilot
      SPRING_DATASOURCE_USERNAME: weblinkpilot
      SPRING_DATASOURCE_PASSWORD: weblinkpilot
      REDIS_URL: redis://redis:6379
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_SMTP_AUTH: false
      SPRING_MAIL_SMTP_STARTTLS: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    container_name: weblink-pilot-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "8081:80"
