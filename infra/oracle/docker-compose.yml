services:
  postgres:
    image: postgres:17-alpine
    container_name: weblink-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weblinkpilot}
      POSTGRES_USER: ${POSTGRES_USER:-weblinkpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weblinkpilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weblinkpilot} -d ${POSTGRES_DB:-weblinkpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weblink-pilot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env}
    container_name: weblink-pilot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-demo}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-weblinkpilot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-weblinkpilot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-weblinkpilot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:?Set APP_PUBLIC_BASE_URL in .env}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:?Set APP_CORS_ALLOWED_ORIGIN_PATTERNS in .env}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
