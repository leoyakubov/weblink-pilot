spring:
  datasource:
    url: jdbc:h2:mem:weblinkpilot_test_${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  mail:
    host: localhost
    port: 1025
    from-address: test@weblinkpilot.local
    from-name: WeblinkPilot Test

app:
  security:
    public-observability: false
  short-link:
    public-base-url: http://localhost:8080
    max-expiration: 365d
    cleanup-retention: 30d
    cleanup-cron: 0 15 3 * * *
  cache:
    provider: local
  auth:
    jwt:
      issuer: weblink-pilot-test
      secret: test-jwt-secret-for-tests-only-0123456789
      access-token-ttl-minutes: 30
    refresh-token:
      ttl-days: 30
    refresh-cookie:
      name: weblinkpilot_refresh
      path: /api/v1/auth
      same-site: Lax
      secure: false
    account-actions:
      token-ttl-hours: 24
      request-cooldown-seconds: 30
    frontend:
      base-url: http://localhost:5173
    github:
      scope: read:user user:email
      authorization-url: https://github.com/login/oauth/authorize
      token-url: https://github.com/login/oauth/access_token
      api-base-url: https://api.github.com
      api-version: 2022-11-28
      user-agent: WeblinkPilot
      timeout: 10s
      allow-signup: false
      login-ticket-ttl-minutes: 10
      state-entropy-bytes: 32
      state-cookie:
        name: weblinkpilot_github_oauth_state
        path: /api/v1/auth/oauth2/github
  rate-limit:
    enabled: true
    api-per-minute: 120
    redirect-per-minute: 300
    auth-per-minute: 20
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081

management:
  endpoint:
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
