spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weblinkpilot}
    username: ${SPRING_DATASOURCE_USERNAME:weblinkpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:weblinkpilot}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  mail:
    host: ${SPRING_MAIL_HOST:mailpit}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

management:
  health:
    mail:
      enabled: true

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  cache:
    provider: redis
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:${JWT_SECRET:local-dev-jwt-secret-change-me-please-0001}}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8081}
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081
