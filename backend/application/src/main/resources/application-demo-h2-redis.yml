spring:
  datasource:
    url: jdbc:h2:mem:weblinkpilot_demo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false

app:
  ai:
    provider: ${APP_AI_PROVIDER:stub}
  auth:
    mail:
      delivery-mode: ${APP_AUTH_MAIL_DELIVERY_MODE:DEMO_PREVIEW}
