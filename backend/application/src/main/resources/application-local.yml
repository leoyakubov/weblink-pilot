spring:
  datasource:
    url: jdbc:h2:mem:weblinkpilot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

management:
  health:
    mail:
      enabled: true

app:
  # Public local runtime
  security:
    public-observability: ${APP_SECURITY_PUBLIC_OBSERVABILITY:true}
  cache:
    provider: local

  # Local credentials and auth behavior
  auth:
    jwt:
      secret: ${APP_AUTH_JWT_SECRET:${JWT_SECRET:local-dev-jwt-secret-change-me-please-0001}}

  # Local AI uses Ollama by default
  ai:
    provider: ${APP_AI_PROVIDER:ollama}
