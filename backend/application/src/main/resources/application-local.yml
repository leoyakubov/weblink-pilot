spring:
  datasource:
    url: jdbc:h2:mem:weblinkpilot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

management:
  health:
    mail:
      enabled: true

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cache:
    provider: local
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081
