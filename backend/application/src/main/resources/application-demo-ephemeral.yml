spring:
  datasource:
    url: jdbc:h2:mem:weblinkpilot_demo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      repositories:
        enabled: false
  cache:
    type: simple
  h2:
    console:
      enabled: false

management:
  health:
    redis:
      enabled: false

app:
  cache:
    provider: local
  auth:
    mail:
      delivery-mode: ${APP_AUTH_MAIL_DELIVERY_MODE:DEMO_PREVIEW}
