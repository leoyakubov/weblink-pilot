spring:
  application:
    name: weblink-pilot
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  cache:
    type: simple
  profiles:
    default: local
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  auth:
    issuer: weblink-pilot
    jwt-secret: ${JWT_SECRET}
    token-ttl-minutes: 30
    refresh-token-ttl-days: 30
    account-action-token-ttl-hours: 24
    github-login-ticket-ttl-minutes: 10
    refresh-cookie-name: weblinkpilot_refresh
    refresh-cookie-path: /api/v1/auth
    refresh-cookie-same-site: Lax
    refresh-cookie-secure: false
    frontend-base-url: http://localhost:8081
    github-client-id: ${GITHUB_CLIENT_ID:}
    github-client-secret: ${GITHUB_CLIENT_SECRET:}
    github-scope: read:user user:email
    github-state-cookie-name: weblinkpilot_github_oauth_state
    github-state-cookie-path: /api/v1/auth/oauth2/github
  short-link:
    max-expiration: 365d
    cleanup-retention: 30d
    cleanup-cron: "0 15 3 * * *"
  cache:
    provider: local
  rate-limit:
    enabled: true
    api-per-minute: 120
    redirect-per-minute: 300

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
