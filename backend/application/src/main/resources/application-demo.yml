spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL}
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}

management:
  health:
    mail:
      enabled: false

app:
  auth:
    mail-delivery-mode: SMTP
    refresh-cookie-same-site: None
    refresh-cookie-secure: true
    frontend-base-url: ${FRONTEND_BASE_URL:${APP_FRONTEND_BASE_URL:https://weblink-pilot.netlify.app}}
    github-client-id: ${GITHUB_CLIENT_ID:}
    github-client-secret: ${GITHUB_CLIENT_SECRET:}
    github-scope: ${APP_GITHUB_SCOPE:read:user user:email}
    github-state-cookie-name: ${APP_AUTH_GITHUB_STATE_COOKIE_NAME:weblinkpilot_github_oauth_state}
    github-state-cookie-path: ${APP_AUTH_GITHUB_STATE_COOKIE_PATH:/api/v1/auth/oauth2/github}
    bootstrap-admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:admin123}
    bootstrap-user-username: ${BOOTSTRAP_USER_USERNAME:user}
    bootstrap-user-password: ${BOOTSTRAP_USER_PASSWORD:user123}
  cache:
    provider: ${APP_CACHE_PROVIDER:redis}
  ai:
    provider: ${APP_AI_PROVIDER:stub}
    ollama:
      base-url: ${APP_AI_OLLAMA_BASE_URL:http://localhost:11434}
      model: ${APP_AI_OLLAMA_MODEL:llama3.2:1b}
  public-base-url: ${APP_PUBLIC_BASE_URL:${RENDER_EXTERNAL_URL:http://localhost:8080}}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS}
