spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL}
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}

management:
  health:
    mail:
      enabled: false

app:
  # Public demo URLs and browser access
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://weblink-pilot.netlify.app}
  short-link:
    public-base-url: ${APP_PUBLIC_BASE_URL:${RENDER_EXTERNAL_URL:http://localhost:8080}}

  # Demo auth hardening
  auth:
    refresh-cookie:
      same-site: None
      secure: true
    frontend:
      base-url: ${FRONTEND_BASE_URL:${APP_FRONTEND_BASE_URL:https://weblink-pilot.netlify.app}}

  # Demo runtime integrations
  cache:
    provider: ${APP_CACHE_PROVIDER:redis}

  # Demo AI stays stubbed unless explicitly enabled
  ai:
    provider: ${APP_AI_PROVIDER:stub}
