spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL}
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}

app:
  auth:
    refresh-cookie-same-site: None
    refresh-cookie-secure: true
    frontend-base-url: ${FRONTEND_BASE_URL:${APP_FRONTEND_BASE_URL:https://weblink-pilot.netlify.app}}
    github-client-id: ${GITHUB_CLIENT_ID:}
    github-client-secret: ${GITHUB_CLIENT_SECRET:}
    github-scope: read:user user:email
    github-state-cookie-name: weblinkpilot_github_oauth_state
    github-state-cookie-path: /api/v1/auth/oauth2/github
    bootstrap-admin-username: ${BOOTSTRAP_ADMIN_USERNAME:}
    bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    bootstrap-user-username: ${BOOTSTRAP_USER_USERNAME:}
    bootstrap-user-password: ${BOOTSTRAP_USER_PASSWORD:}
  cache:
    provider: redis
  public-base-url: ${APP_PUBLIC_BASE_URL:${RENDER_EXTERNAL_URL:http://localhost:8080}}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS}
