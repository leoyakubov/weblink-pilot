spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weblinkpilot}
    username: ${SPRING_DATASOURCE_USERNAME:weblinkpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:weblinkpilot}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}

app:
  cache:
    provider: redis
  public-base-url: http://localhost:8080
  auth:
    frontend-base-url: http://localhost:8081
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081
