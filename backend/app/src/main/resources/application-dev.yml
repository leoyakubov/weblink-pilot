spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weblinkpilot}
    username: ${SPRING_DATASOURCE_USERNAME:weblinkpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:weblinkpilot}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  auth:
    bootstrap-admin-username: admin
    bootstrap-admin-password: admin123
    bootstrap-admin-role: ADMIN
    bootstrap-user-username: user
    bootstrap-user-password: user123
    bootstrap-user-role: USER
  cache:
    provider: redis
  public-base-url: http://localhost:8080
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081
