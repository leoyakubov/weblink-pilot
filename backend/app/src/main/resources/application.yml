spring:
  application:
    name: weblink-pilot
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  cache:
    type: simple
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  auth:
    issuer: weblink-pilot
    jwt-secret: ${JWT_SECRET}
    token-ttl-minutes: 30
    refresh-token-ttl-days: 30
    refresh-cookie-name: weblinkpilot_refresh
    refresh-cookie-path: /api/v1/auth
    refresh-cookie-same-site: Lax
    refresh-cookie-secure: false
  short-link:
    max-expiration: 365d
    cleanup-retention: 30d
    cleanup-cron: "0 15 3 * * *"
  cache:
    provider: local
  rate-limit:
    enabled: true
    api-per-minute: 120
    redirect-per-minute: 300

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
