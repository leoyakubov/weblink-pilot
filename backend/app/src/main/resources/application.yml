spring:
  application:
    name: weblink-pilot
  datasource:
    url: jdbc:h2:mem:weblinkpilot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
      - http://localhost:8081
      - http://127.0.0.1:8081
  cache:
    provider: local
  rate-limit:
    enabled: true
    api-per-minute: 120
    redirect-per-minute: 300

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
