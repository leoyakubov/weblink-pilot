spring:
  application:
    name: weblink-pilot
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  cache:
    type: simple
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  auth:
    issuer: weblink-pilot
    jwt-secret: ${JWT_SECRET:weblink-pilot-demo-secret-change-me-0123456789}
    token-ttl-minutes: 240
    bootstrap-admin-username: ${ADMIN_USERNAME:admin}
    bootstrap-admin-password: ${ADMIN_PASSWORD:admin123}
  cache:
    provider: local
  rate-limit:
    enabled: true
    api-per-minute: 120
    redirect-per-minute: 300

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
