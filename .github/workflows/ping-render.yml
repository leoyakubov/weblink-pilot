name: Ping Render

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: demo

    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL || secrets.RENDER_HEALTH_URL }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_HEALTH_URL:-}" ]; then
            echo "RENDER_HEALTH_URL is not set in the demo environment."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            "$RENDER_HEALTH_URL" \
            >/dev/null
          echo "Pinged $RENDER_HEALTH_URL"
