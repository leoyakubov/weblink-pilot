run-name: "Deploy Frontend: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message || github.sha }}"

name: Deploy frontend

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  skip-ci-failed:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped deploy
        run: |
          {
            echo "## Frontend deploy"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: CI did not succeed"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN || secrets.VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Mark manual deploy
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "frontend_changed=true" >> "$GITHUB_OUTPUT"

      - name: Detect frontend changes
        if: github.event_name == 'workflow_run'
        id: changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(frontend/|\.github/workflows/deploy-frontend\.yml$)' >/dev/null; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when frontend did not change
        if: steps.manual.outputs.frontend_changed != 'true' && steps.changes.outputs.frontend_changed != 'true'
        run: |
          echo "No frontend-relevant files changed; skipping frontend deploy."
          {
            echo "## Frontend deploy"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: no frontend-relevant files changed"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Set up Node 22
        if: steps.manual.outputs.frontend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.manual.outputs.frontend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.manual.outputs.frontend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Deploy to Netlify
        if: steps.manual.outputs.frontend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        id: deploy
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail

          deploy_output="$(npx --yes netlify-cli deploy --dir=dist --prod --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --json)"
          printf '%s\n' "$deploy_output"

          deploy_url="$(printf '%s' "$deploy_output" | jq -r '.deploy_url // .url // .site_url // empty')"
          if [ -z "$deploy_url" ]; then
            echo "Netlify deploy did not return a deploy URL."
            exit 1
          fi

          printf 'deploy_url=%s\n' "$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Publish frontend deploy smoke dispatch
        if: steps.manual.outputs.frontend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          DEPLOY_MESSAGE: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: |
          set -euo pipefail

          payload="$(jq -nc \
            --arg sha "$DEPLOY_SHA" \
            --arg message "$DEPLOY_MESSAGE" \
            --arg smoke_url "$DEPLOY_URL" \
            '{event_type:"frontend_deployed", client_payload:{sha:$sha, message:$message, smoke_url:$smoke_url}}')"

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            >/dev/null

          {
            echo "## Frontend deploy"
            echo ""
            echo "- Status: deployed"
            echo "- Commit: ${DEPLOY_SHA}"
            echo "- Deploy URL: ${DEPLOY_URL}"
            echo "- Smoke: dispatched"
          } >> "$GITHUB_STEP_SUMMARY"
