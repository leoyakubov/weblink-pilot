name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend style checks
        run: ./scripts/backend/check-style.sh

      - name: Build and test backend
        working-directory: backend
        run: ./mvnw -B -ntp -Pci -pl shared-contracts,url,analytics,app,coverage -am clean verify

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Sonar analysis
        if: env.SONAR_TOKEN != ''
        working-directory: backend
        run: ./mvnw -B -ntp -Pci -pl shared-contracts,url,analytics,app,coverage -am clean verify sonar:sonar -Dsonar.token=$SONAR_TOKEN

      - name: Skip Sonar analysis
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured; skipping Sonar analysis."

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend style checks
        run: ./scripts/frontend/check-style.sh

      - name: Run frontend coverage gate
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build
