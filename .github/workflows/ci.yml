run-name: "CI - ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message }}"

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Verify backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend style checks
        run: bash ./scripts/quality/backend-style.sh

      - name: Build and test backend
        working-directory: backend
        run: ./mvnw -B -Pci clean verify

  sonar:
    name: Scan with Sonar
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ false }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Skip Sonar analysis
        run: echo "Sonar analysis is temporarily disabled; run it locally with scripts/quality/sonar-analysis.sh."

  frontend:
    name: Verify frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend style checks
        run: bash ./scripts/quality/frontend-style.sh

      - name: Run frontend coverage gate
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  secrets:
    name: Scan secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secret scan
        run: bash ./scripts/git/scan-secrets.sh
