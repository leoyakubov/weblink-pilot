name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend style checks
        run: ./scripts/unix/quality/backend-style.sh

      - name: Build and test backend
        working-directory: backend
        run: ./mvnw -B -Pci clean install

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ false }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Skip Sonar analysis
        run: echo "Sonar analysis is temporarily disabled; run it locally with scripts/win/quality/sonar-analysis.ps1 or scripts/unix/quality/sonar-analysis.sh."

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend style checks
        run: ./scripts/unix/quality/frontend-style.sh

      - name: Run frontend coverage gate
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secret scan
        run: ./scripts/unix/git/scan-secrets.sh
