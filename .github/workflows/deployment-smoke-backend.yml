name: BE Smoke

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy backend]
    types: [completed]

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo

    env:
      SMOKE_TARGET: demo
      SMOKE_CHECK: backend
      RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL || secrets.RENDER_HEALTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Run backend deployment smoke checks
        run: ./scripts/quality/deployment-smoke.sh
