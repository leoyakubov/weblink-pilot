run-name: Smoke Frontend: ${{ github.event.client_payload.sha || github.sha }}

name: Smoke Frontend

on:
  workflow_dispatch:
  repository_dispatch:
    types: [frontend_deployed]

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: demo

    env:
      SMOKE_TARGET: demo
      SMOKE_CHECK: frontend
      FRONTEND_SMOKE_URL: ${{ github.event.client_payload.smoke_url || vars.FRONTEND_SMOKE_URL || secrets.FRONTEND_SMOKE_URL }}
      DEPLOY_SHA: ${{ github.event.client_payload.sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.sha }}
          fetch-depth: 2

      - name: Report smoke target
        run: |
          echo "Smoke triggered for commit ${DEPLOY_SHA}"
          echo "Frontend smoke will check the freshly deployed Netlify URL when available."

      - name: Run frontend deployment smoke checks
        run: ./scripts/unix/quality/deployment-smoke.sh
