name: Deploy backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/weblink-pilot-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend artifact
        working-directory: backend
        run: ./mvnw -B -ntp -pl app -am package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy Oracle compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "infra/oracle/docker-compose.yml"
          target: "~/weblink-pilot"

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/weblink-pilot
            cat > .env <<EOF
            BACKEND_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}
            POSTGRES_DB=${{ secrets.ORACLE_POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.ORACLE_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.ORACLE_POSTGRES_PASSWORD }}
            APP_PUBLIC_BASE_URL=${{ secrets.ORACLE_PUBLIC_BASE_URL }}
            APP_CORS_ALLOWED_ORIGIN_PATTERNS=${{ secrets.ORACLE_CORS_ALLOWED_ORIGIN_PATTERNS }}
            SPRING_PROFILES_ACTIVE=demo
            EOF
            docker compose --env-file .env -f docker-compose.yml pull
            docker compose --env-file .env -f docker-compose.yml up -d --remove-orphans
