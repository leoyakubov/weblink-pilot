name: Deploy backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect backend changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(backend/|infra/docker-compose\.yml$|backend/Dockerfile$|backend/\.dockerignore$|backend/pom\.xml$|\.github/workflows/deploy-backend\.yml$)' >/dev/null; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when backend did not change
        if: steps.changes.outputs.backend_changed != 'true'
        run: |
          echo "No backend-relevant files changed; skipping backend deploy."
          exit 0

      - name: Trigger Render deploy
        if: steps.changes.outputs.backend_changed == 'true'
        run: |
          set -euo pipefail

          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi

          deploy_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          curl --fail --silent --show-error --request POST "${RENDER_DEPLOY_HOOK_URL}&ref=${deploy_sha}" >/dev/null
          echo "Triggered Render deploy for ${deploy_sha}"
