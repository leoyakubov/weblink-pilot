name: Deploy backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_BACKEND_SERVICE_ID: ${{ vars.RENDER_BACKEND_SERVICE_ID }}
      RENDER_API_BASE_URL: https://api.render.com/v1

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Mark manual deploy
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "backend_changed=true" >> "$GITHUB_OUTPUT"

      - name: Detect backend changes
        if: github.event_name == 'workflow_run'
        id: changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(backend/|infra/docker-compose\.yml$|backend/Dockerfile$|backend/\.dockerignore$|backend/pom\.xml$|\.github/workflows/deploy-backend\.yml$)' >/dev/null; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when backend did not change
        if: steps.manual.outputs.backend_changed != 'true' && steps.changes.outputs.backend_changed != 'true'
        run: |
          echo "No backend-relevant files changed; skipping backend deploy."
          {
            echo "## Backend deploy"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: no backend-relevant files changed"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Capture current backend deploy id
        id: baseline
        if: steps.manual.outputs.backend_changed == 'true' || steps.changes.outputs.backend_changed == 'true'
        run: |
          set -euo pipefail

          response="$(curl --silent --show-error --fail \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "$RENDER_API_BASE_URL/services/$RENDER_BACKEND_SERVICE_ID/deploys")"
          deploy_id="$(printf '%s' "$response" | jq -r '
            def deploy_list:
              if type == "array" then .
              elif type == "object" then
                (.deploys // .items // .data // .result // .deployments // .service.deploys // .service.items // [])
              else [] end;

            deploy_list
            | map(select(type == "object"))
            | map(if has("deploy") and (.deploy | type == "object") then .deploy else . end)
            | .[0].id // .[0].deployId // empty
          ')"
          printf 'baseline_deploy_id=%s\n' "$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy
        if: steps.manual.outputs.backend_changed == 'true' || steps.changes.outputs.backend_changed == 'true'
        run: |
          set -euo pipefail

          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi

          deploy_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          curl --fail --silent --show-error --request POST "${RENDER_DEPLOY_HOOK_URL}&ref=${deploy_sha}" >/dev/null
          echo "Triggered Render deploy for ${deploy_sha}"

      - name: Wait for backend to become ready
        if: steps.manual.outputs.backend_changed == 'true' || steps.changes.outputs.backend_changed == 'true'
        run: sh ./scripts/unix/dev/render-deploy-wait.sh
        env:
          BASELINE_DEPLOY_ID: ${{ steps.baseline.outputs.baseline_deploy_id }}

      - name: Publish backend deploy smoke dispatch
        if: steps.manual.outputs.backend_changed == 'true' || steps.changes.outputs.backend_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$(printf '{"event_type":"backend_deployed","client_payload":{"sha":"%s"}}' "$DEPLOY_SHA")" \
            >/dev/null

          {
            echo "## Backend deploy"
            echo ""
            echo "- Status: deployed"
            echo "- Commit: ${DEPLOY_SHA}"
            echo "- Smoke: dispatched"
          } >> "$GITHUB_STEP_SUMMARY"
